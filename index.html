<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Work With Coop</title>
    <link rel="stylesheet" href="./src/output.css">
</head>
<body>
    <section class="flex flex-col items-center gap-5 py-25">
        <h1 class="text-[#5756FF] text-4xl font-black">MY TO DO LIST</h1>
        <div class="flex rounded-[10px] shadow-[0_10px_20px_#F0F0F0]">
            <input class="p-3 pr-80 placeholder:text-[#5A5A5A]" type="text" placeholder="Masukan to do list">
            <button class="bg-linear-to-r from-[#07FDFD] to-[#4D69FE] to-[#CC00FF] rounded-r-[10px] text-white p-3 px-8">Save</button>
        </div>
        <div class="flex flex-wrap gap-5 w-[40%]">
            <div class="py-1 shadow-[0_0_3px_gray] px-3 border border-[#D9D9D9] w-[48%]">
                <p class="text-[#07FDFD]">Todo Done : 50</p>
            </div>
            <div class="py-1 shadow-[0_0_3px_gray] px-3 border border-[#D9D9D9] w-[48%]">
                <p class="text-[#07FDFD]">Todo Done : 50</p>
            </div>
            <div class="w-full py-2 px-4 flex justify-between items-center shadow-[0_0_1px_gray]">
                <h2>Membuat Api</h2>
                <img src="src/img/icons.png" alt="">
            </div>
            <div class="w-full py-2 px-4 flex justify-between items-center shadow-[0_0_1px_gray] border border-[#D9D9D9]">
                <h2>Membuat tampilan Home page</h2>
                <img src="src/img/icons.png" alt="">
            </div>
            <div class="w-full py-2 px-4 flex justify-between items-center shadow-[0_0_1px_gray]">
                <h2>Dashboard Menu</h2>
                <img src="src/img/icons.png" alt="">
            </div>
            <div class="w-full py-2 px-4 flex justify-between items-center shadow-[0_0_1px_gray]">
                <h2>Usability testing bareng marketing</h2>
                <img src="src/img/icons.png" alt="">
            </div>
        </div>
    </section>
</body>
</html>
